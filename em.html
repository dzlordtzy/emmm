<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message For Maricar</title>
    <style>
        /* Base Styles & Smooth Scroll */
        html {
            scroll-behavior: smooth; 
        }

        body {
            margin: 0;
            padding: 0;
            /* Ultra-luxurious midnight blue to black gradient */
            background: radial-gradient(circle at center, #111d33 0%, #03060f 100%); 
            color: #fcf9f2; 
            font-family: 'Times New Roman', Times, serif;
            overflow-x: hidden;
            /* Smoothly transition background colors when the mood changes */
            transition: background 2s ease-in-out; 
        }

        /* Wrap main content to easily fade it out */
        #main-wrapper {
            width: 100%;
            transition: opacity 1s ease, transform 1s ease;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        h1 { 
            font-size: 1.8rem; 
            margin-bottom: 0.5rem; 
            letter-spacing: 8px; 
            color: #d4af37; 
            font-weight: normal;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        h2 { 
            font-size: 5rem; 
            color: #fdf5d3; 
            margin-top: 0; 
            margin-bottom: 1rem;
            font-style: italic;
            text-shadow: 0 0 30px rgba(253, 245, 211, 0.4);
            letter-spacing: 5px;
            font-weight: normal;
        }

        .subtitle { 
            font-style: italic; 
            color: #8c9bbd; 
            font-size: 1.4rem;
            letter-spacing: 1.5px;
            position: relative;
        }

        .subtitle::before, .subtitle::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 50px;
            height: 1px;
            background-color: #d4af37;
            opacity: 0.5;
        }
        .subtitle::before { left: -70px; }
        .subtitle::after { right: -70px; }

        /* Bouncing Scroll Link */
        .scroll-indicator {
            position: absolute;
            bottom: 50px;
            color: #d4af37;
            font-size: 1rem;
            font-style: italic;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            animation: bounce 2s infinite;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .scroll-indicator:hover {
            opacity: 1;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }

        /* Message Section */
        .content-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
        }

        /* Fade In Animation Class for scrolling */
        .hidden-scroll {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1.5s ease-out, transform 1.5s ease-out;
        }

        .show-scroll {
            opacity: 1;
            transform: translateY(0);
        }

        /* Luxurious Message Box */
        .message-box {
            background: linear-gradient(145deg, rgba(10, 15, 30, 0.9), rgba(5, 8, 15, 0.95));
            padding: 70px 60px;
            border-radius: 2px; 
            border-top: 1px solid #d4af37;
            border-bottom: 1px solid #d4af37;
            max-width: 650px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 0 40px rgba(212, 175, 55, 0.03);
            margin-bottom: 80px;
            line-height: 2.2;
            font-size: 1.5rem;
            color: #f0e6d2;
            font-style: italic;
        }

        .message-box p {
            margin: 15px 0;
        }

        /* Interactive Question Area */
        .question-box {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h3 {
            font-size: 2.4rem;
            margin-bottom: 15px;
            color: #fdf5d3;
            font-weight: normal;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(253, 245, 211, 0.2);
        }

        /* Pulsing Heart Animation */
        .heart {
            font-size: 3.5rem;
            color: #c9182b; 
            margin-bottom: 40px;
            animation: heartbeat 2s infinite;
            filter: drop-shadow(0 0 20px rgba(201, 24, 43, 0.5));
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.15); }
            28% { transform: scale(1); }
            42% { transform: scale(1.15); }
            70% { transform: scale(1); }
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        /* High-End Buttons */
        button {
            padding: 15px 50px;
            font-size: 1.1rem;
            font-family: 'Times New Roman', Times, serif;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 1px;
            cursor: pointer;
            transition: all 0.5s ease;
        }

        #yes-btn { 
            background-color: #d4af37; 
            color: #03060f; 
            border: 1px solid #d4af37;
            font-weight: bold;
        }

        #yes-btn:hover { 
            background-color: #fdf5d3; 
            border-color: #fdf5d3;
            transform: translateY(-4px); 
            box-shadow: 0 15px 25px rgba(212, 175, 55, 0.2);
        }

        #no-btn { 
            background-color: transparent; 
            color: #d4af37; 
            border: 1px solid #d4af37;
        }

        #no-btn:hover { 
            background-color: rgba(212, 175, 55, 0.05); 
            transform: translateY(-4px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
        }

        /* Warning Text before final choice */
        #response-text {
            font-size: 1.8rem;
            font-style: italic;
            color: #fdf5d3;
            min-height: 50px;
            transition: opacity 0.5s ease;
            margin-top: 25px;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(253, 245, 211, 0.3);
        }

        /* --- FINAL SCREEN STYLES --- */
        .fade-out {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        .display-none {
            display: none !important;
        }

        #final-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            padding: 20px;
            box-sizing: border-box;
            z-index: 100;
            pointer-events: none; /* Ignore clicks while fading in */
        }

        .fade-in {
            opacity: 1 !important;
        }

        #final-text {
            font-size: 3rem;
            font-style: italic;
            letter-spacing: 2px;
            line-height: 1.5;
            max-width: 900px;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <!-- Main Wrapper (Hides entirely upon final answer) -->
    <div id="main-wrapper">
        <!-- First Viewport (Hero) -->
        <section class="hero">
            <h1>A Message, Just For You</h1>
            <h2>Maricar</h2>
            <p class="subtitle">This page was made with love</p>
            
            <a href="#message" class="scroll-indicator">Scroll Down &darr;</a>
        </section>

        <!-- Second Viewport (Message & Question) -->
        <section id="message" class="content-section">
            <div class="message-box hidden-scroll">
                <p>bla bla bla</p>
                <p>bla bla bla</p>
                <p>bla bla bla</p>
            </div>

            <div class="question-box hidden-scroll">
                <h3>Will you give me the chance to be yours?</h3>
                <div class="heart">❤️</div>
                
                <div class="buttons" id="button-container">
                    <button id="yes-btn">Yes</button>
                    <button id="no-btn">No</button>
                </div>
                <p id="response-text"></p>
            </div>
        </section>
    </div>

    <!-- Final Screen (Only shows the ending message) -->
    <div id="final-screen" class="display-none">
        <h1 id="final-text"></h1>
    </div>

    <!-- Interactive Logic -->
    <script>
        // Smooth fade-in scroll effect for elements
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show-scroll');
                }
            });
        }, { threshold: 0.2 });

        const hiddenElements = document.querySelectorAll('.hidden-scroll');
        hiddenElements.forEach((el) => observer.observe(el));

        // Interaction Logic
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const responseText = document.getElementById('response-text');
        
        const mainWrapper = document.getElementById('main-wrapper');
        const finalScreen = document.getElementById('final-screen');
        const finalText = document.getElementById('final-text');

        let noClickCount = 0;

        // Function to handle the screen transition
        function triggerFinalScreen(mood, text) {
            // 1. Fade out the main website
            mainWrapper.classList.add('fade-out');

            // 2. Wait for fade out, then swap elements
            setTimeout(() => {
                mainWrapper.classList.add('display-none');
                finalScreen.classList.remove('display-none');

                // 3. Apply the Mood Design
                if (mood === 'happy') {
                    // Deep romantic red for Yes
                    document.body.style.background = 'radial-gradient(circle at center, #3a0d16 0%, #0a0204 100%)';
                    finalText.style.color = '#fdf5d3'; // Bright champagne gold
                    finalText.style.textShadow = '0 0 30px rgba(253, 245, 211, 0.4)';
                } else if (mood === 'sad') {
                    // Cold, lonely dark midnight for No
                    document.body.style.background = 'radial-gradient(circle at center, #0a111c 0%, #020407 100%)';
                    finalText.style.color = '#5a698a'; // Muted, sad silver
                    finalText.style.textShadow = 'none'; // Removes glow
                }

                // Insert the text
                finalText.innerHTML = text;

                // 4. Fade in the final screen smoothly
                setTimeout(() => {
                    finalScreen.classList.add('fade-in');
                }, 100); 
                
            }, 1000); // 1 second matches the fade-out CSS duration
        }

        // Logic for YES
        yesBtn.addEventListener('click', () => {
            triggerFinalScreen('happy', "Oh really??? Lord Daniel loves you so much!! ❤️");
        });

        // Logic for NO
        noBtn.addEventListener('click', () => {
            noClickCount++;
            
            if (noClickCount === 1) {
                // First attempt to click NO (Warns her on the current screen)
                responseText.textContent = "Oh, just think about it...";
            } else if (noClickCount === 2) {
                // Second attempt to click NO (Triggers sad mood screen)
                triggerFinalScreen('sad', "Take all the time you need. You are absolutely worth the wait.");
            }
        });
    </script>
</body>
</html>
